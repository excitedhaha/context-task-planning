# Requires a Codex CLI build that lists `codex_hooks` in `codex features list`.

[features]
codex_hooks = true

[[hooks.SessionStart]]
matcher = "startup|resume|clear"

[[hooks.SessionStart.hooks]]
type = "command"
command = 'python3 "$HOME/.codex/skills/context-task-planning/codex-hooks/scripts/session_start.py"'
timeout = 8
statusMessage = "Loading task context"

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = 'python3 "$HOME/.codex/skills/context-task-planning/codex-hooks/scripts/user_prompt_submit.py"'
timeout = 5
statusMessage = "Checking planning context"

[[hooks.PostToolUse]]
matcher = "Bash|apply_patch|Edit|Write"

[[hooks.PostToolUse.hooks]]
type = "command"
command = 'python3 "$HOME/.codex/skills/context-task-planning/codex-hooks/scripts/post_tool_use.py"'
timeout = 5
statusMessage = "Tracking planning evidence"

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = 'python3 "$HOME/.codex/skills/context-task-planning/codex-hooks/scripts/stop.py"'
timeout = 8
statusMessage = "Checking planning sync"
